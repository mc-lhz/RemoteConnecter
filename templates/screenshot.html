<html>
    <head>
        <title>实时屏幕</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                text-align: center;
            }
            #screenshot {
                max-width: 100%; 
                max-height: 90vh; 
                width: auto; 
                height: auto; 
                object-fit: contain;
            }
            #refresh-btn {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <img src="/screenshot?getimage=true" alt="实时屏幕" id="screenshot">
        <br>
        <button id="refresh-btn">停止</button>
        <script>
            var isRunning = true;
            var img = document.getElementById('screenshot');
            var btn = document.getElementById('refresh-btn');
            
            // 图片加载完成后自动刷新下一张
            img.onload = function() {
                if (isRunning) {
                    this.src = '/screenshot?getimage=true&t=' + new Date().getTime();
                }
            };
            
            // 点击按钮切换状态
            btn.onclick = function() {
                if (this.textContent === '停止') {
                    isRunning = false;
                    this.textContent = '开始';
                } else {
                    isRunning = true;
                    this.textContent = '停止';
                    // 立即刷新一次
                    img.src = '/screenshot?getimage=true&t=' + new Date().getTime();
                }
            };
        </script>
    </body>
</html>
